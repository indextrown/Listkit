name: 빌드 및 테스트 검증

on:
  # main 브랜치로 PR을 열거나 업데이트할 때 실행
  pull_request:
    branches: [main]
  workflow_dispatch:

# 같은 브랜치에서 이전 CI가 아직 돌고 있는데 새 커밋이 올라오면, 이전 실행을 취소하고 최신 커밋 기준으로 다시 실행하도록 설정
concurrency:
  group: build-and-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select iOS Simulator
        id: simulator
        run: |
          DESTINATION=$(xcrun simctl list devices available -j | jq -r '
            [.devices[]?[] | select(.name | startswith("iPhone"))][0] |
            "platform=iOS Simulator,id=\(.udid)"
          ')

          if [ -z "$DESTINATION" ] || [ "$DESTINATION" = "platform=iOS Simulator,id=null" ]; then
            echo "No available iPhone simulator found."
            exit 1
          fi

          echo "destination=$DESTINATION" >> "$GITHUB_OUTPUT"
          echo "Selected destination: $DESTINATION"

      - name: Build
        id: build_step
        continue-on-error: true
        run: |
          xcodebuild \
            -scheme ListKit \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Test
        id: test_step
        if: ${{ steps.build_step.outcome == 'success' }}
        continue-on-error: true
        run: |
          xcodebuild \
            -scheme ListKit \
            -destination '${{ steps.simulator.outputs.destination }}' \
            CODE_SIGNING_ALLOWED=NO \
            test

      - name: Comment PR result
        if: ${{ always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.user.login != 'dependabot[bot]' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const build = '${{ steps.build_step.outcome }}';
            const test = '${{ steps.test_step.outcome }}';

            const workflow = context.workflow;
            const branch = context.payload.pull_request.head.ref;
            const commit = context.payload.pull_request.head.sha.substring(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            let message = '';

            if (build !== 'success') {
              message = [
                `❌ @${context.actor} 빌드 CI가 실패했습니다.`,
                '',
                `- Workflow: ${workflow}`,
                `- Branch: ${branch}`,
                `- Commit: ${commit}`,
                `- Run: ${runUrl}`
              ].join('\n');
            } else if (test !== 'success') {
              message = [
                `❌ @${context.actor} 테스트 CI가 실패했습니다.`,
                '',
                `- Workflow: ${workflow}`,
                `- Branch: ${branch}`,
                `- Commit: ${commit}`,
                `- Run: ${runUrl}`
              ].join('\n');
            } else {
              message = [
                `✅ @${context.actor} 빌드 및 테스트 CI가 성공했습니다.`,
                '',
                `- Workflow: ${workflow}`,
                `- Branch: ${branch}`,
                `- Commit: ${commit}`,
                `- Run: ${runUrl}`
              ].join('\n');
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: message
            });

      - name: Fail workflow when build or test failed
        if: ${{ always() && (steps.build_step.outcome != 'success' || (steps.build_step.outcome == 'success' && steps.test_step.outcome != 'success')) }}
        run: exit 1
